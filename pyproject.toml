# Root pyproject.toml — quality tool configuration only (not a Python package)

[tool.ruff]
target-version = "py311"
line-length = 120
src = ["components/*/src", "libs/wip-auth/src"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # do not perform function call in argument defaults — FastAPI Depends()
]

[tool.ruff.lint.isort]
known-first-party = ["registry", "def_store", "template_store", "document_store", "reporting_sync", "ingest_gateway", "wip_auth", "mcp_server"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
disallow_untyped_defs = false
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true

[tool.vulture]
min_confidence = 80
paths = ["components/", "libs/wip-auth/"]
exclude = ["*/tests/*", "*/__pycache__/*", "*/node_modules/*", "components/seed_data/*", "components/mcp-server/*"]

[tool.bandit]
exclude_dirs = ["tests", "*/tests/*"]
skips = ["B101"]  # assert used in tests

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
