api_version: wip.dev/v1
kind: App
metadata:
  name: clintrial
  category: optional
  description: |
    Clinical Trials explorer — demo app for WIP. Reads data from the
    document-store and provides a search/explore UI.

spec:
  image:
    name: clintrial-explorer
    # App lives in its own repo (WIP-ClinTrial). No code change for
    # the backend v1.2.1 retry work, so pin to v1.2.0.
    tag: v1.2.0

  ports:
    - {name: http, container_port: 3001}
    # Vite dev server (CASE-57). Used only when `wip-deploy install
    # --target dev --app-source clintrial=<path>` is active; Caddy
    # then routes /apps/clintrial/* to this port instead of :3001.
    # Ignored on compose/k8s and on dev without the override.
    - {name: dev, container_port: 5174}

  env:
    required:
      - {name: WIP_BASE_URL, source: {from_component: router}}
      - {name: WIP_API_KEY, source: {from_secret: api-key}}
      - {name: APP_BASE_PATH, source: {literal: /apps/clintrial}}
      - {name: VITE_BASE_PATH, source: {literal: /apps/clintrial}}
      - {name: PORT, source: {literal: "3001"}}
      - {name: NODE_ENV, source: {literal: production}}

  routes:
    - {path: /apps/clintrial, auth_required: true}

  depends_on: [document-store]

  healthcheck:
    # Express server mounts routes under the APP_BASE_PATH, so /health
    # lives at /apps/clintrial/health. Probing raw /health returns 404.
    endpoint: /apps/clintrial/health
    probe: auto
    start_period_seconds: 15

app_metadata:
  display_name: ClinTrial Explorer
  route_prefix: /apps/clintrial
  ui_only: false
