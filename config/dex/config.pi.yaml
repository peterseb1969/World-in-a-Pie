# Dex OIDC Provider Configuration for WIP (Raspberry Pi with Caddy/HTTPS)
#
# This configuration is for Pi deployments with Caddy reverse proxy.
# Requires HTTPS (via Caddy) for browser OIDC to work.
#
# IMPORTANT: Set the WIP_HOSTNAME environment variable to your Pi's hostname
#   e.g., WIP_HOSTNAME=wip-dev-pi.local
#
# Test users:
#   admin@wip.local / admin123 (wip-admins group)
#   editor@wip.local / editor123 (wip-editors group)
#   viewer@wip.local / viewer123 (wip-viewers group)

# Issuer URL - must match what's in JWT tokens
# Uses environment variable for hostname (set in docker-compose)
issuer: https://${WIP_HOSTNAME}/dex

# Storage backend - SQLite for simplicity
storage:
  type: sqlite3
  config:
    file: /data/dex.db

# Web server configuration
web:
  http: 0.0.0.0:5556

# Enable the password database for static users
enablePasswordDB: true

# Static users (for development and minimal deployments)
staticPasswords:
  - email: admin@wip.local
    hash: "$2b$12$FU5QNFECeqot7P1G/G9/GuBXQTLgXylqATk8iiIlTjWESVZVBKqzy"
    username: admin
    userID: "admin-001"
  - email: editor@wip.local
    hash: "$2b$12$KyDkUF9JjxL5joJbaNTz3eGiV/yZF/DrSuGPmN0iHicjd1DKLcLPK"
    username: editor
    userID: "editor-001"
  - email: viewer@wip.local
    hash: "$2b$12$RBQB01brEKNINrWbCBkzlun8DaKzJVJH8PZ553.YLFYkU9kFlzq1a"
    username: viewer
    userID: "viewer-001"

# OAuth2 clients
staticClients:
  - id: wip-console
    name: WIP Console
    secret: wip-console-secret
    redirectURIs:
      # HTTPS redirect URIs for Caddy deployment
      - https://${WIP_HOSTNAME}/auth/callback
      - https://${WIP_HOSTNAME}/auth/silent-renew
      # Also allow localhost for direct access on Pi
      - http://localhost:3000/auth/callback
    public: false

# Token expiration settings
expiry:
  deviceRequests: "5m"
  signingKeys: "6h"
  idTokens: "24h"
  refreshTokens:
    validIfNotUsedFor: "720h"
    absoluteLifetime: "2160h"

# OAuth2 settings
oauth2:
  responseTypes: ["code", "token", "id_token"]
  skipApprovalScreen: true
  alwaysShowLoginScreen: false
  passwordConnector: local

# Logging
logger:
  level: "info"
  format: "text"
