# WIP Preset: Standard
#
# Recommended for most deployments.
# OIDC authentication via Dex, but no SQL reporting.
# Table view via MongoDB is sufficient for many use cases.
#
# Use case:
#   - Multi-user setups with login
#   - Network-accessible deployments
#   - When SQL reporting is not needed
#
# Services: MongoDB, NATS, Dex, Caddy, Registry, Def-Store, Template-Store, Document-Store, Console
# Auth: OIDC (Dex) + API keys
#

PRESET_NAME="standard"
PRESET_DESCRIPTION="Standard - OIDC authentication, no SQL reporting"

# Modules to include
MODULES="oidc"

# Auth configuration
WIP_AUTH_MODE="dual"
VITE_OIDC_ENABLED="true"

# Services to start
START_REPORTING_SYNC="false"
START_INGEST_GATEWAY="false"
