# WIP Preset: Full
#
# Everything enabled - all modules included.
# Maximum functionality, higher resource usage.
#
# Use case:
#   - Full-featured deployments
#   - Development with all features available
#   - Testing complete system behavior
#
# Services: MongoDB, NATS, PostgreSQL, MinIO, Dex, Caddy, Registry, Def-Store,
#           Template-Store, Document-Store, Reporting-Sync, Ingest-Gateway, Console
# Auth: OIDC (Dex) + API keys
#

PRESET_NAME="full"
PRESET_DESCRIPTION="Full - all features enabled"

# Modules to include
MODULES="oidc,reporting,files,ingest"

# Auth configuration
WIP_AUTH_MODE="dual"
VITE_OIDC_ENABLED="true"

# Services to start
START_REPORTING_SYNC="true"
START_INGEST_GATEWAY="true"
