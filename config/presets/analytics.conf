# WIP Preset: Analytics
#
# Standard deployment plus PostgreSQL for SQL reporting.
# Use when you need SQL queries, BI dashboards, or complex analytics.
#
# Use case:
#   - Business intelligence requirements
#   - Cross-template SQL joins
#   - Integration with Metabase, Grafana, etc.
#
# Services: MongoDB, NATS, PostgreSQL, Dex, Caddy, Registry, Def-Store,
#           Template-Store, Document-Store, Reporting-Sync, Console
# Auth: OIDC (Dex) + API keys
#

PRESET_NAME="analytics"
PRESET_DESCRIPTION="Analytics - OIDC + SQL reporting"

# Modules to include
MODULES="oidc,reporting"

# Auth configuration
WIP_AUTH_MODE="dual"
VITE_OIDC_ENABLED="true"

# Services to start
START_REPORTING_SYNC="true"
START_INGEST_GATEWAY="false"
