# WIP Production Compose — generated by build-release.sh
# Registry: gitea.local:3000/peter  Tag: test1
#
# Usage:
#   docker compose -f docker-compose.production.yml pull
#   docker compose -f docker-compose.production.yml up -d
#
# Prerequisites:
#   - Copy .env.example to .env and edit
#   - Ensure the container registry is accessible

services:

  # ── Infrastructure ──────────────────────────────────────────

  mongodb:
    image: docker.io/library/mongo:7
    container_name: wip-mongodb
    # No host port — accessed only by WIP services on the container network.
    volumes:
      - wip-mongo-data:/data/db
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand(\"ping\").ok'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: docker.io/library/postgres:16
    container_name: wip-postgres
    # No host port — accessed only by reporting-sync on the container network.
    environment:
      POSTGRES_USER: ${WIP_POSTGRES_USER:-wip}
      POSTGRES_PASSWORD: ${WIP_POSTGRES_PASSWORD:-wip}
      POSTGRES_DB: ${WIP_POSTGRES_DB:-wip_reporting}
    volumes:
      - wip-postgres-data:/var/lib/postgresql/data
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WIP_POSTGRES_USER:-wip}"]
      interval: 30s
      timeout: 10s
      retries: 3

  nats:
    image: docker.io/library/nats:2
    container_name: wip-nats
    command: ["-js", "-m", "8222"]
    # No host ports — accessed by WIP services and RC Console on the container network.
    volumes:
      - wip-nats-data:/data
    networks:
      - wip-network
    restart: unless-stopped

  minio:
    image: docker.io/minio/minio:latest
    container_name: wip-minio
    command: server /data --console-address ":9001"
    # No host ports — accessed by document-store and registry on the container network.
    environment:
      MINIO_ROOT_USER: ${WIP_FILE_STORAGE_ACCESS_KEY:-wip-minio-root}
      MINIO_ROOT_PASSWORD: ${WIP_FILE_STORAGE_SECRET_KEY:-wip-minio-password}
    volumes:
      - wip-minio-data:/data
    networks:
      - wip-network
    restart: unless-stopped

  dex:
    image: ghcr.io/dexidp/dex:v2.45.0
    container_name: wip-dex
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./config/dex/config.yaml:/etc/dex/config.yaml:ro
      - wip-dex-data:/data
    networks:
      - wip-network
    restart: unless-stopped

  caddy:
    image: docker.io/library/caddy:2
    container_name: wip-caddy
    ports:
      - "8443:8443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - wip-caddy-data:/data
    networks:
      - wip-network
    restart: unless-stopped

  # ── WIP Services ────────────────────────────────────────────

  registry:
    image: ghcr.io/peterseb1969/registry:v1.1.0
    container_name: wip-registry
    # No host port — accessed via Caddy reverse proxy.
    env_file: .env
    environment:
      PYTHONPATH: /app/src
      MONGO_URI: ${WIP_MONGO_URI:-mongodb://wip-mongodb:27017/}
      DATABASE_NAME: wip_registry
      MASTER_API_KEY: ${API_KEY}
      WIP_AUTH_LEGACY_API_KEY: ${API_KEY}
      AUTH_ENABLED: "true"
      WIP_AUTH_TRUST_PROXY_HEADERS: "true"
      REPORTING_SYNC_URL: http://wip-reporting-sync:8005
      DEF_STORE_URL: http://wip-def-store:8002
      TEMPLATE_STORE_URL: http://wip-template-store:8003
      DOCUMENT_STORE_URL: http://wip-document-store:8004
      MINIO_URL: http://wip-minio:9000
      MINIO_ACCESS_KEY: ${WIP_FILE_STORAGE_ACCESS_KEY:-wip-minio-root}
      MINIO_SECRET_KEY: ${WIP_FILE_STORAGE_SECRET_KEY:-wip-minio-password}
      MINIO_BUCKET: wip-attachments
      CORS_ORIGINS: ${WIP_CORS_ORIGINS:-}
    command: ["uvicorn", "registry.main:app", "--host", "0.0.0.0", "--port", "8001"]
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      mongodb:
        condition: service_healthy

  def-store:
    image: ghcr.io/peterseb1969/def-store:v1.1.0
    container_name: wip-def-store
    env_file: .env
    environment:
      PYTHONPATH: /app/src
      MONGO_URI: ${WIP_MONGO_URI:-mongodb://wip-mongodb:27017/}
      DATABASE_NAME: wip_def_store
      REGISTRY_URL: http://wip-registry:8001
      REGISTRY_API_KEY: ${API_KEY}
      NATS_URL: nats://wip-nats:4222
      CORS_ORIGINS: ${WIP_CORS_ORIGINS:-}
    command: ["uvicorn", "def_store.main:app", "--host", "0.0.0.0", "--port", "8002"]
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      mongodb:
        condition: service_healthy
      registry:
        condition: service_healthy

  template-store:
    image: ghcr.io/peterseb1969/template-store:v1.1.0
    container_name: wip-template-store
    env_file: .env
    environment:
      PYTHONPATH: /app/src
      MONGO_URI: ${WIP_MONGO_URI:-mongodb://wip-mongodb:27017/}
      DATABASE_NAME: wip_template_store
      REGISTRY_URL: http://wip-registry:8001
      REGISTRY_API_KEY: ${API_KEY}
      DEF_STORE_URL: http://wip-def-store:8002
      DEF_STORE_API_KEY: ${API_KEY}
      NATS_URL: nats://wip-nats:4222
      CORS_ORIGINS: ${WIP_CORS_ORIGINS:-}
    command: ["uvicorn", "template_store.main:app", "--host", "0.0.0.0", "--port", "8003"]
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      mongodb:
        condition: service_healthy
      registry:
        condition: service_healthy

  document-store:
    image: ghcr.io/peterseb1969/document-store:v1.1.0
    container_name: wip-document-store
    env_file: .env
    environment:
      PYTHONPATH: /app/src
      MONGO_URI: ${WIP_MONGO_URI:-mongodb://wip-mongodb:27017/}
      DATABASE_NAME: wip_document_store
      REGISTRY_URL: http://wip-registry:8001
      REGISTRY_API_KEY: ${API_KEY}
      TEMPLATE_STORE_URL: http://wip-template-store:8003
      TEMPLATE_STORE_API_KEY: ${API_KEY}
      DEF_STORE_URL: http://wip-def-store:8002
      DEF_STORE_API_KEY: ${API_KEY}
      NATS_URL: nats://wip-nats:4222
      WIP_FILE_STORAGE_ENABLED: "true"
      WIP_FILE_STORAGE_ENDPOINT: http://wip-minio:9000
      WIP_FILE_STORAGE_ACCESS_KEY: ${WIP_FILE_STORAGE_ACCESS_KEY:-wip-minio-root}
      WIP_FILE_STORAGE_SECRET_KEY: ${WIP_FILE_STORAGE_SECRET_KEY:-wip-minio-password}
      WIP_FILE_STORAGE_BUCKET: wip-attachments
      WIP_FILE_STORAGE_PUBLIC_ENDPOINT: ${WIP_FILE_STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
      CORS_ORIGINS: ${WIP_CORS_ORIGINS:-}
    command: ["uvicorn", "document_store.main:app", "--host", "0.0.0.0", "--port", "8004"]
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      mongodb:
        condition: service_healthy
      registry:
        condition: service_healthy

  reporting-sync:
    image: ghcr.io/peterseb1969/reporting-sync:v1.1.0
    container_name: wip-reporting-sync
    env_file: .env
    environment:
      PYTHONPATH: /app/src
      MONGO_URI: ${WIP_MONGO_URI:-mongodb://wip-mongodb:27017/}
      POSTGRES_HOST: wip-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${WIP_POSTGRES_DB:-wip_reporting}
      POSTGRES_USER: ${WIP_POSTGRES_USER:-wip}
      POSTGRES_PASSWORD: ${WIP_POSTGRES_PASSWORD:-wip}
      TEMPLATE_STORE_URL: http://wip-template-store:8003
      TEMPLATE_STORE_API_KEY: ${API_KEY}
      DOCUMENT_STORE_URL: http://wip-document-store:8004
      DEF_STORE_URL: http://wip-def-store:8002
      NATS_URL: nats://wip-nats:4222
      CORS_ORIGINS: ${WIP_CORS_ORIGINS:-}
    command: ["uvicorn", "reporting_sync.main:app", "--host", "0.0.0.0", "--port", "8005"]
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  ingest-gateway:
    image: ghcr.io/peterseb1969/ingest-gateway:v1.1.0
    container_name: wip-ingest-gateway
    env_file: .env
    environment:
      PYTHONPATH: /app/src
      NATS_URL: nats://wip-nats:4222
      DOCUMENT_STORE_URL: http://wip-document-store:8004
      DOCUMENT_STORE_API_KEY: ${API_KEY}
      CORS_ORIGINS: ${WIP_CORS_ORIGINS:-}
    command: ["uvicorn", "ingest_gateway.main:app", "--host", "0.0.0.0", "--port", "8006"]
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/api/ingest-gateway/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcp-server:
    image: ghcr.io/peterseb1969/mcp-server:v1.1.0
    container_name: wip-mcp-server
    env_file: .env
    environment:
      PYTHONPATH: /app/src
      WIP_API_KEY: ${API_KEY}
      REGISTRY_URL: http://wip-registry:8001
      DEF_STORE_URL: http://wip-def-store:8002
      TEMPLATE_STORE_URL: http://wip-template-store:8003
      DOCUMENT_STORE_URL: http://wip-document-store:8004
      REPORTING_SYNC_URL: http://wip-reporting-sync:8005
      MCP_PORT: "8007"
      MCP_ALLOWED_HOST: wip-mcp-server
    command: ["python", "-m", "wip_mcp", "--sse"]
    networks:
      - wip-network
    restart: unless-stopped
    depends_on:
      registry:
        condition: service_healthy

  auth-gateway:
    image: ghcr.io/peterseb1969/auth-gateway:v1.1.0
    container_name: wip-auth-gateway
    env_file: .env
    environment:
      OIDC_ISSUER: https://${WIP_HOSTNAME:-localhost}:8443/dex
      OIDC_INTERNAL_ISSUER: http://wip-dex:5556/dex
      OIDC_CLIENT_ID: wip-gateway
      OIDC_CLIENT_SECRET: ${WIP_GATEWAY_SECRET}
      SESSION_SECRET: ${WIP_GATEWAY_SESSION_SECRET}
      API_KEY: ${API_KEY}
      WIP_HOSTNAME: ${WIP_HOSTNAME:-localhost}
      CALLBACK_URL: https://${WIP_HOSTNAME:-localhost}:8443/auth/callback
    networks:
      - wip-network
    restart: unless-stopped
    depends_on:
      dex:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4180/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  wip-mongo-data:
  wip-postgres-data:
  wip-nats-data:
  wip-minio-data:
  wip-dex-data:
  wip-caddy-data:

networks:
  wip-network:
    name: wip-network
