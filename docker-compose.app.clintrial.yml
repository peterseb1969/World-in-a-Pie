# WIP App: ClinTrial Explorer
# Drop this file into your WIP install directory and re-run setup-wip.sh.
# See docs/install-test-guide.md for details.

services:
  clintrial-explorer:
    image: gitea.local:3000/peter/clintrial-explorer:latest
    container_name: wip-clintrial-explorer
    labels:
      wip.app: "true"
      wip.app.name: "ClinTrial Explorer"
      wip.app.route: "/apps/clintrial"
      wip.app.port: "3001"
    environment:
      WIP_BASE_URL: ${WIP_BASE_URL:-https://wip-caddy:8443}
      WIP_API_KEY: ${API_KEY}
      VITE_BASE_PATH: /apps/clintrial
      PORT: "3001"
      NODE_ENV: production
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wip-network:
    external: true
