# WIP Module: NATS Message Queue
#
# Adds NATS JetStream for event streaming:
#   - NATS: localhost:4222 (client), localhost:8222 (monitoring)
#
# Auto-included by: reporting, ingest modules
# Can also be specified explicitly for custom NATS consumers.
#
# Monitor: curl http://localhost:8222/healthz
#
version: "3.8"

services:
  nats:
    image: docker.io/library/nats:2.10
    container_name: wip-nats
    command: ["--js", "--sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"   # Client connections
      - "${WIP_NATS_MONITOR_PORT:-8222}:8222"   # HTTP monitoring (set to empty in prod to disable)
    volumes:
      - ${WIP_DATA_DIR:-./data}/nats:/data
    # Note: NATS image is minimal (no shell/curl/wget), so healthcheck
    # is disabled. Container will still restart on crash via restart policy.
    networks:
      - wip-network
    restart: unless-stopped

networks:
  wip-network:
    external: true
