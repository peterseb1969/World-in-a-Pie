# WIP Module: File Storage
#
# Adds S3-compatible file storage for binary attachments:
#   - MinIO S3 API: localhost:9000
#   - MinIO Console: http://localhost:9001
#
# Credentials: wip-minio-root / wip-minio-password
# Bucket: wip-attachments (auto-created by Document Store)
#
# Enables:
#   - File upload/download via Document Store API
#   - Binary attachments linked to documents
#
version: "3.8"

services:
  # ===================
  # File Storage (S3-compatible)
  # ===================
  minio:
    image: quay.io/minio/minio:latest
    container_name: wip-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "${WIP_MINIO_CONSOLE_PORT:-9001}:9001"   # Web Console (set to empty in prod to disable)
    environment:
      MINIO_ROOT_USER: ${WIP_MINIO_USER:-wip-minio-root}
      MINIO_ROOT_PASSWORD: ${WIP_MINIO_PASSWORD:-wip-minio-password}
    volumes:
      - ${WIP_DATA_DIR:-./data}/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wip-network
    restart: unless-stopped

networks:
  wip-network:
    external: true
