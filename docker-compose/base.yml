# WIP Infrastructure - Base
#
# Core service required for all deployments:
#   - MongoDB (document store): localhost:27017
#
# NATS is a separate module — auto-included by reporting and ingest modules.
#
# This file is combined with module overlays by setup.sh
# Do not use directly - use: ./scripts/setup.sh --preset <preset>
#
# Storage: Set WIP_DATA_DIR to customize data location (default: ./data)
#
version: "3.8"

services:
  # ===================
  # Document Store
  # ===================
  mongodb:
    image: ${WIP_MONGODB_IMAGE:-docker.io/library/mongo:7}
    container_name: wip-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ${WIP_DATA_DIR:-./data}/mongodb:/data/db
    environment:
      # MongoDB authentication (production mode only)
      # If WIP_MONGO_USER is empty, MongoDB runs without auth
      MONGO_INITDB_ROOT_USERNAME: ${WIP_MONGO_USER:-}
      MONGO_INITDB_ROOT_PASSWORD: ${WIP_MONGO_PASSWORD:-}
    healthcheck:
      # Note: default avoids curly braces which break ${VAR:-default} interpolation
      test: ${WIP_MONGODB_HEALTHCHECK:-mongosh --quiet --eval "db.adminCommand('ping').ok"}
      interval: ${WIP_HEALTH_CHECK_INTERVAL:-10}s
      timeout: 5s
      retries: 5
    networks:
      wip-network:
        # Alias 'mongo' needed for mongo-express startup script which checks /dev/tcp/mongo/27017
        aliases:
          - mongo
    restart: unless-stopped

networks:
  wip-network:
    name: wip-network
    driver: bridge
