api_version: wip.dev/v1
kind: Component
metadata:
  name: console
  category: optional
  description: |
    WIP Console — Vue 3 + PrimeVue UI. SPA served by nginx. Build-time
    VITE_* args are injected from deployment.auth and deployment.modules
    (reporting/files/ingest flags). Routes are proxied by the top-level
    ingress (Caddy or NGINX Ingress), not by this container.

spec:
  image:
    name: wip-console
    build_context: .

  ports:
    - {name: http, container_port: 80}

  env:
    # Runtime env for nginx.conf templating (service hosts for reverse_proxy).
    # Build-time VITE_* args are handled by the renderer as build_args —
    # they're not runtime env.
    optional:
      - {name: DEF_STORE_HOST, source: {from_component: def-store}}
      - {name: TEMPLATE_STORE_HOST, source: {from_component: template-store}}
      - {name: DOCUMENT_STORE_HOST, source: {from_component: document-store}}
      - {name: REPORTING_SYNC_HOST, source: {from_component: reporting-sync}}

  routes:
    # Console is the catch-all ("/") route — handled by the top-level
    # ingress, not this container. The renderer emits the default path
    # to this component as part of generating Caddyfile / Ingress rules.
    - {path: /, auth_required: false}

  depends_on: [def-store, template-store, document-store]

  healthcheck:
    endpoint: /
    start_period_seconds: 10

  oidc_client:
    client_id: wip-console
    redirect_paths: [/auth/callback, /auth/silent-renew]
