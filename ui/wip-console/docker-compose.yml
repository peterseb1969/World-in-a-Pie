# WIP Console — Unified dev/prod configuration
# Dev overrides (dist mount) are in docker-compose.override.yml (auto-generated by setup.sh)
#
# Production: builds dist into image (target: production)
# Development: mounts dist/ from host (target: development, set via WIP_CONSOLE_TARGET)
services:
  wip-console:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${WIP_CONSOLE_TARGET:-production}
      args:
        VITE_OIDC_ENABLED: ${VITE_OIDC_ENABLED:-true}
        VITE_OIDC_AUTHORITY: /dex
        VITE_OIDC_CLIENT_ID: wip-console
        VITE_OIDC_CLIENT_SECRET: wip-console-secret
        VITE_OIDC_PROVIDER_NAME: Dex
        VITE_REPORTING_ENABLED: ${VITE_REPORTING_ENABLED}
        VITE_FILES_ENABLED: ${VITE_FILES_ENABLED}
        VITE_INGEST_ENABLED: ${VITE_INGEST_ENABLED}
    container_name: wip-console
    volumes:
      - ../../config/console/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - DEF_STORE_HOST=wip-def-store:8002
      - TEMPLATE_STORE_HOST=wip-template-store:8003
      - DOCUMENT_STORE_HOST=wip-document-store:8004
    networks:
      - wip-network
    restart: ${WIP_RESTART_POLICY:-unless-stopped}

networks:
  wip-network:
    external: true
