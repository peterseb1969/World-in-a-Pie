version: '3.8'

# Development setup - assumes you're running the WIP infrastructure separately
# and want to join the same network.
#
# Usage:
#   1. First run setup.sh to generate .env with proper configuration
#   2. Start the WIP infrastructure (from WorldInPie root):
#      podman-compose -f docker-compose.infra.yml up -d
#      cd components/def-store && podman-compose -f docker-compose.dev.yml up -d
#      cd ../template-store && podman-compose -f docker-compose.dev.yml up -d
#
#   3. Then start this UI (creates/joins the shared network):
#      podman-compose -f docker-compose.dev.yml up -d
#
# The UI will connect to def-store and template-store via the shared network.

services:
  wip-console-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: wip-console-dev
    # Port 3000 not exposed to host - access via Caddy on https://localhost:8443
    # Caddy reaches the container internally via wip-network
    expose:
      - "3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=development
      # Connect to backend services via container names on shared network
      - VITE_DEF_STORE_TARGET=http://wip-def-store-dev:8002
      - VITE_TEMPLATE_STORE_TARGET=http://wip-template-store-dev:8003
      - VITE_DOCUMENT_STORE_TARGET=http://wip-document-store-dev:8004
      - VITE_REPORTING_SYNC_TARGET=http://wip-reporting-sync-dev:8005
      # OIDC config (VITE_OIDC_*, VITE_DEX_TARGET) comes from .env via env_file
    networks:
      - wip-network

networks:
  wip-network:
    # Creates the network if it doesn't exist, or joins if it does
    name: wip-network
    driver: bridge
