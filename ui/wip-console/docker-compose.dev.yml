version: '3.8'

# Development setup - assumes you're running the WIP infrastructure separately
# and want to join the same network.
#
# Usage:
#   1. First start the WIP infrastructure (from WorldInPie root):
#      podman-compose -f docker-compose.infra.yml up -d
#      cd components/def-store && podman-compose -f docker-compose.dev.yml up -d
#      cd ../template-store && podman-compose -f docker-compose.dev.yml up -d
#
#   2. Then start this UI (creates/joins the shared network):
#      podman-compose -f docker-compose.dev.yml up -d
#
# The UI will connect to def-store and template-store via the shared network.

services:
  wip-console-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: wip-console-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # Connect to def-store container by name on shared network
      - VITE_DEF_STORE_TARGET=http://wip-def-store-dev:8002
      # Connect to template-store container by name on shared network
      - VITE_TEMPLATE_STORE_TARGET=http://wip-template-store-dev:8003
      # Connect to document-store container by name on shared network
      - VITE_DOCUMENT_STORE_TARGET=http://wip-document-store-dev:8004
      # Dex target for Vite proxy (container-to-container)
      - VITE_DEX_TARGET=http://wip-dex:5556
      # OIDC configuration - uses /dex proxy to avoid CORS issues
      - VITE_OIDC_AUTHORITY=/dex
      - VITE_OIDC_CLIENT_ID=wip-console
      - VITE_OIDC_CLIENT_SECRET=wip-console-secret
      - VITE_OIDC_PROVIDER_NAME=Dex
    networks:
      - wip-network

networks:
  wip-network:
    # Creates the network if it doesn't exist, or joins if it does
    name: wip-network
    driver: bridge
