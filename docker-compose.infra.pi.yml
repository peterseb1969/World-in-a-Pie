# WIP Shared Infrastructure - Raspberry Pi 4
# Optimized for ARMv8.0 (Pi 4) with limited RAM
#
# Key differences from standard infra:
#   - MongoDB 4.4.18 (last version supporting ARMv8.0, Pi 4's Cortex-A72)
#   - No Mongo Express (saves ~50MB RAM)
#
# Services:
#   - MongoDB (document store): localhost:27017
#   - PostgreSQL (reporting store): localhost:5432 (wip/wip_dev_password)
#   - NATS (message queue): localhost:4222, monitoring: http://localhost:8222
#   - Dex (OIDC provider): http://localhost:5556
#
# Usage:
#   podman-compose -f docker-compose.infra.pi.yml up -d
#
# To access PostgreSQL: podman exec -it wip-postgres psql -U wip -d wip_reporting
#
# IMPORTANT: After starting, you may need to update config/dex/config.yaml
# to set the correct issuer URL for your Pi's hostname (e.g., wip-dev-pi.local)
#
version: "3.8"

services:
  # ===================
  # Document Store
  # ===================
  mongodb:
    image: mongo:4.4.18
    container_name: wip-mongodb
    ports:
      - "27017:27017"
    volumes:
      - wip-mongodb-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wip-network
    restart: unless-stopped

  # ===================
  # Reporting Store
  # ===================
  postgres:
    image: postgres:16
    container_name: wip-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wip_reporting
      POSTGRES_USER: wip
      POSTGRES_PASSWORD: wip_dev_password
    volumes:
      - wip-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wip -d wip_reporting"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wip-network
    restart: unless-stopped

  # ===================
  # Message Queue
  # ===================
  nats:
    image: nats:2.10
    container_name: wip-nats
    command: ["--js", "--sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    volumes:
      - wip-nats-data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - wip-network
    restart: unless-stopped

  # ===================
  # Authentication (OIDC)
  # ===================
  dex:
    image: ghcr.io/dexidp/dex:v2.38.0
    container_name: wip-dex
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    ports:
      - "5556:5556"
    volumes:
      - ./config/dex:/etc/dex:ro
      - wip-dex-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5556/dex/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - wip-network
    restart: unless-stopped

networks:
  wip-network:
    name: wip-network
    driver: bridge

volumes:
  wip-mongodb-data:
  wip-postgres-data:
  wip-nats-data:
  wip-dex-data:
