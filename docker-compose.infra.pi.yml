# WIP Shared Infrastructure - Raspberry Pi
# Optimized for Pi 4/5 deployments
#
# Key differences from standard infra:
#   - MongoDB 4.4.18 (last version supporting ARMv8.0, Pi 4's Cortex-A72)
#   - No Mongo Express (saves ~50MB RAM)
#   - Caddy for HTTPS (enables OIDC over network)
#
# Services:
#   - MongoDB (document store): localhost:27017
#   - PostgreSQL (reporting store): localhost:5432 (wip/wip_dev_password)
#   - NATS (message queue): localhost:4222, monitoring: http://localhost:8222
#   - MinIO (file storage): S3 API localhost:9000, Console http://localhost:9001
#   - Dex (OIDC provider): internal only (via Caddy)
#   - Caddy (reverse proxy): https://localhost:8443, http://localhost:8080
#
# Storage Configuration:
#   Set WIP_DATA_DIR to customize where data is stored.
#   Default: ./data (relative to this file)
#
#   Examples:
#     WIP_DATA_DIR=/mnt/usb-ssd podman-compose -f docker-compose.infra.pi.yml up -d
#     WIP_DATA_DIR=/mnt/nfs/wip podman-compose -f docker-compose.infra.pi.yml up -d
#
#   See docs/storage.md for detailed configuration options.
#
# Usage:
#   podman-compose -f docker-compose.infra.pi.yml up -d
#
# Access: https://<hostname>:8443 (e.g., https://wip-dev-pi.local:8443)
#   Browser will warn about self-signed cert - accept it once
#
# To disable OIDC/Caddy: use docker-compose.infra.pi.minimal.yml instead
#
version: "3.8"

services:
  # ===================
  # Document Store
  # ===================
  mongodb:
    image: docker.io/library/mongo:4.4.18
    container_name: wip-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ${WIP_DATA_DIR:-./data}/mongodb:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wip-network
    restart: unless-stopped

  # ===================
  # MongoDB UI (for pi-large profile with 8GB+ RAM)
  # ===================
  mongo-express:
    image: docker.io/library/mongo-express
    container_name: wip-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - wip-network
    restart: unless-stopped

  # ===================
  # Reporting Store
  # ===================
  postgres:
    image: docker.io/library/postgres:16
    container_name: wip-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wip_reporting
      POSTGRES_USER: wip
      POSTGRES_PASSWORD: wip_dev_password
    volumes:
      - ${WIP_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wip -d wip_reporting"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wip-network
    restart: unless-stopped

  # ===================
  # Message Queue
  # ===================
  nats:
    image: docker.io/library/nats:2.10
    container_name: wip-nats
    command: ["--js", "--sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    volumes:
      - ${WIP_DATA_DIR:-./data}/nats:/data
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - wip-network
    restart: unless-stopped

  # ===================
  # File Storage (S3-compatible)
  # ===================
  minio:
    image: quay.io/minio/minio:latest
    container_name: wip-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: wip-minio-root
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-wip-minio-password}
    volumes:
      - ${WIP_DATA_DIR:-./data}/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wip-network
    restart: unless-stopped

  # ===================
  # Authentication (OIDC)
  # ===================
  dex:
    image: ghcr.io/dexidp/dex:v2.38.0
    container_name: wip-dex
    # Config is generated by setup.sh with correct hostname already substituted
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./config/dex:/etc/dex:ro
      - ${WIP_DATA_DIR:-./data}/dex:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5556/dex/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - wip-network
    restart: unless-stopped

  # ===================
  # Reverse Proxy (HTTPS)
  # ===================
  caddy:
    image: docker.io/library/caddy:2-alpine
    container_name: wip-caddy
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${WIP_DATA_DIR:-./data}/caddy/data:/data
      - ${WIP_DATA_DIR:-./data}/caddy/config:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - wip-network
    restart: unless-stopped

networks:
  wip-network:
    name: wip-network
    driver: bridge

# No named volumes - using bind mounts for configurable storage
# Data stored in ${WIP_DATA_DIR:-./data}/
