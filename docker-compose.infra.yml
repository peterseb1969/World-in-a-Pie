# WIP Shared Infrastructure - Development
# Start this first, then start individual services
version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: wip-mongodb
    ports:
      - "27017:27017"
    volumes:
      - wip-mongodb-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wip-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express
    container_name: wip-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - wip-network
    restart: unless-stopped

networks:
  wip-network:
    name: wip-network
    driver: bridge

volumes:
  wip-mongodb-data:
