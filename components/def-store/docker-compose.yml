# WIP Def-Store Service - Production
# Requires: docker-compose -f ../../docker-compose.infra.prod.yml up -d
#           Registry service running and WIP namespaces initialized
version: "3.8"

services:
  def-store:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wip-def-store
    ports:
      - "8002:8002"
    env_file:
      - ../../.env
    environment:
      # Database configuration
      - MONGO_URI=${WIP_MONGO_URI:-mongodb://wip-mongodb:27017/}
      - DATABASE_NAME=wip_def_store
      # Service URLs (internal network)
      - REGISTRY_URL=http://wip-registry:8001
      - REGISTRY_API_KEY=${API_KEY}
      # CORS (empty = no CORS restrictions in production behind reverse proxy)
      - CORS_ORIGINS=
      # Auth config (WIP_AUTH_*) comes from .env via env_file
    volumes:
      - ../../libs/wip-auth:/app/libs/wip-auth:ro
    command: bash -c "pip install -q /app/libs/wip-auth && uvicorn def_store.main:app --host 0.0.0.0 --port 8002"
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wip-network:
    external: true
