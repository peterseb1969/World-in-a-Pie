# WIP Def-Store Service — Unified dev/prod configuration
# Dev overrides (source mounts) are in docker-compose.override.yml (auto-generated by setup.sh)
services:
  def-store:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wip-def-store
    ports:
      - "8002:8002"
    env_file:
      - ../../.env
    environment:
      - PYTHONPATH=/app/src
      - MONGO_URI=${WIP_MONGO_URI:-mongodb://wip-mongodb:27017/}
      - DATABASE_NAME=wip_def_store
      - REGISTRY_URL=${REGISTRY_URL:-http://wip-registry:8001}
      - REGISTRY_API_KEY=${API_KEY}
      - TEMPLATE_STORE_URL=${TEMPLATE_STORE_URL:-http://wip-template-store:8003}
      - TEMPLATE_STORE_API_KEY=${API_KEY}
      - CORS_ORIGINS=${WIP_CORS_ORIGINS:-}
    volumes:
      - ../../libs/wip-auth:/app/libs/wip-auth:ro
    command: >
      bash -c "pip install -q /app/libs/wip-auth &&
      uvicorn def_store.main:app --host 0.0.0.0 --port 8002
      ${WIP_DEV_RELOAD:+--reload}"
    networks:
      - wip-network
    restart: ${WIP_RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wip-network:
    external: true
