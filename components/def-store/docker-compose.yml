# WIP Def-Store Service - Production
# Requires: docker-compose -f ../../docker-compose.infra.prod.yml up -d
#           Registry service running and WIP namespaces initialized
version: "3.8"

services:
  def-store:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wip-def-store
    ports:
      - "8002:8002"
    environment:
      - MONGO_URI=mongodb://mongoadmin:${MONGO_PASSWORD:?MONGO_PASSWORD is required}@wip-mongodb:27017/
      - DATABASE_NAME=wip_def_store
      - API_KEY=${API_KEY:?API_KEY is required}
      - REGISTRY_URL=http://wip-registry:8001
      - REGISTRY_API_KEY=${REGISTRY_API_KEY:?REGISTRY_API_KEY is required}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wip-network:
    external: true
