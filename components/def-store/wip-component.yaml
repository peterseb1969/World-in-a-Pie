api_version: wip.dev/v1
kind: Component
metadata:
  name: def-store
  category: core
  description: |
    Terminology management. Stores controlled vocabularies and terms
    with ontology term-relations. Consumed by Template-Store for term
    validation on document fields.

spec:
  image:
    name: def-store
    build_context: .

  ports:
    - {name: http, container_port: 8002}

  command: [uvicorn, def_store.main:app, --host, 0.0.0.0, --port, "8002"]

  env:
    required:
      - {name: MONGO_URI, source: {from_component: mongodb}}
      - {name: DATABASE_NAME, source: {literal: wip_def_store}}
      - {name: REGISTRY_URL, source: {from_component: registry}}
      - {name: MASTER_API_KEY, source: {from_secret: api-key}}
      # Outbound credential used when this service calls registry
      # (api-keys/sync on startup, namespace lookups, etc.). Must
      # match registry's MASTER_API_KEY.
      - {name: REGISTRY_API_KEY, source: {from_secret: api-key}}
    optional:
      - {name: CORS_ORIGINS, source: {from_spec: network.cors_origins}}
      # NATS is optional — only present when reporting or ingest module active.
      # Def-store publishes terminology/term/term_relation events here;
      # reporting-sync's worker consumes them to populate metadata tables
      # in real time. When NATS_URL is empty the service gracefully skips.
      - {name: NATS_URL, source: {from_component: nats}}

  routes:
    - {path: /api/def-store, auth_required: false}

  depends_on: [mongodb, registry]

  healthcheck:
    endpoint: /health
