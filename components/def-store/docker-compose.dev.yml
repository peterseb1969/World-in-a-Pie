# WIP Def-Store Service - Development
# Requires: docker-compose -f ../../docker-compose.infra.yml up -d
#           Registry service running and WIP namespaces initialized
version: "3.8"

services:
  def-store:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wip-def-store-dev
    ports:
      - "8002:8002"
    environment:
      - MONGO_URI=mongodb://wip-mongodb:27017/
      - DATABASE_NAME=wip_def_store_dev
      - REGISTRY_URL=http://wip-registry-dev:8001
      - REGISTRY_API_KEY=dev_master_key_for_testing
      - TEMPLATE_STORE_URL=http://wip-template-store-dev:8003
      - TEMPLATE_STORE_API_KEY=dev_master_key_for_testing
      - CORS_ORIGINS=*
      - PYTHONPATH=/app/src
      # Authentication - dual mode allows both API keys and JWT tokens
      - WIP_AUTH_MODE=dual
      - WIP_AUTH_API_KEYS_FILE=/app/config/api-keys.json
      # Issuer URL matches what's in the token (override for Pi: https://hostname/dex)
      - WIP_AUTH_JWT_ISSUER_URL=https://localhost:8443/dex
      # JWKS fetched via container network (wip-dex is on the same network)
      - WIP_AUTH_JWT_JWKS_URI=http://wip-dex:5556/dex/keys
      - WIP_AUTH_JWT_AUDIENCE=wip-console
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ../../libs/wip-auth:/app/libs/wip-auth:ro
      - ../../config/api-keys.dev.json:/app/config/api-keys.json:ro
    command: bash -c "pip install -q /app/libs/wip-auth && uvicorn def_store.main:app --host 0.0.0.0 --port 8002 --reload"
    networks:
      - wip-network

networks:
  wip-network:
    external: true
