# WIP Registry Service — Unified dev/prod configuration
# Dev overrides (source mounts) are in docker-compose.override.yml (auto-generated by setup.sh)
services:
  registry:
    container_name: wip-registry
    image: kubi5-1.local:32000/wip-registry:latest
    ports:
      - "8001:8001"
    env_file:
      - ../../.env
    environment:
      - PYTHONPATH=/app/src
      - MONGO_URI=${WIP_MONGO_URI:-mongodb://wip-mongodb:27017/}
      - DATABASE_NAME=wip_registry
      - MASTER_API_KEY=${API_KEY}
      - AUTH_ENABLED=true
      - CORS_ORIGINS=${WIP_CORS_ORIGINS:-}
    volumes:
      - ./config:/app/config:ro
    command: ["uvicorn", "registry.main:app", "--host", "0.0.0.0", "--port", "8001"]
    networks:
      - wip-network
    restart: ${WIP_RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wip-network:
    external: true
