# WIP Registry Service - Production
# Requires: docker-compose -f ../../docker-compose.infra.prod.yml up -d
version: "3.8"

services:
  registry:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wip-registry
    ports:
      - "8001:8001"
    env_file:
      - ../../.env
    environment:
      - PYTHONPATH=/app/src
      # Database configuration
      - MONGO_URI=${WIP_MONGO_URI:-mongodb://wip-mongodb:27017/}
      - DATABASE_NAME=wip_registry
      # Auth configuration
      - AUTH_ENABLED=true
      # CORS (empty = no CORS restrictions in production behind reverse proxy)
      - CORS_ORIGINS=
      # Auth config (WIP_AUTH_*) comes from .env via env_file
    volumes:
      - ./config:/app/config:ro
      - ../../libs/wip-auth:/app/libs/wip-auth:ro
    command: bash -c "pip install -q /app/libs/wip-auth && uvicorn registry.main:app --host 0.0.0.0 --port 8001"
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wip-network:
    external: true
