api_version: wip.dev/v1
kind: Component
metadata:
  name: registry
  category: core
  description: |
    ID & namespace authority. Source of truth for identity resolution
    (canonical IDs, synonyms, human-readable values). Every other WIP
    service resolves identifiers through the Registry.

spec:
  image:
    name: registry
    # Per-component tag override. Bumped when the deployer's global content
    # tag won't force a re-pull (Kubernetes IfNotPresent + cached digest).
    # First pin landed for CASE-291 (PUT-vs-PATCH safety-guard parity).
    tag: wipkb-20260601
    build_context: .

  ports:
    - {name: http, container_port: 8001}

  command: [uvicorn, registry.main:app, --host, 0.0.0.0, --port, "8001"]

  env:
    required:
      - {name: MONGO_URI, source: {from_component: mongodb}}
      - {name: DATABASE_NAME, source: {literal: wip_registry}}
      - {name: MASTER_API_KEY, source: {from_secret: api-key}}
      # Legacy bearer-auth path used by wip-auth middleware. Without
      # this, X-API-Key from the gateway fails auth on PUT/DELETE
      # endpoints even though MASTER_API_KEY matches.
      - {name: WIP_AUTH_LEGACY_API_KEY, source: {from_secret: api-key}}
      - {name: AUTH_ENABLED, source: {literal: "true"}}
      # Let wip-auth trust the X-WIP-User / X-WIP-Groups headers the
      # gateway injects — required for gateway-authenticated browser
      # flows (as opposed to raw API key callers).
      - {name: WIP_AUTH_TRUST_PROXY_HEADERS, source: {literal: "true"}}
      # Derived from deployment.spec.auth.mode (CASE-361). api-key-only
      # → api_key_only; oidc → jwt_only; hybrid → dual. Without this,
      # wip-auth defaulted to api_key_only regardless of spec.auth.mode,
      # making oidc/hybrid bearer flows silently inert.
      - {name: WIP_AUTH_MODE, source: {from_spec: auth.wip_auth_mode}}
    optional:
      - {name: CORS_ORIGINS, source: {from_spec: network.cors_origins}}
      # JWT issuer URL — internal Dex endpoint. Honored by wip-auth in
      # jwt_only / dual modes; ignored in api_key_only. Declared optional
      # so a future deployment without Dex (api-key-only) doesn't need
      # to plumb a stub value. CASE-361.
      - {name: WIP_AUTH_JWT_ISSUER_URL, source: {from_spec: auth.issuer_url_internal}}
      # Cascade target for namespace-delete (CASE-34/CASE-59). When
      # reporting-sync is active, Registry's namespace-delete flow
      # calls DELETE /api/reporting-sync/namespace/{prefix} to cascade
      # the wipe into Postgres. Without this, Mongo gets wiped but
      # Postgres retains the old rows — the "fresh" namespace re-reads
      # stale data via reporting-sync. Declared optional because
      # reporting-sync is itself optional: when it's inactive, the
      # var stays unset and Registry skips the cascade call cleanly.
      - {name: REPORTING_SYNC_URL, source: {from_component: reporting-sync}}

  routes:
    - {path: /api/registry, auth_required: false}

  depends_on: [mongodb]

  healthcheck:
    endpoint: /health
    start_period_seconds: 15

  post_install:
    - name: initialize-wip-namespaces
      run: |
        curl -sfX POST http://wip-registry:8001/api/registry/namespaces/initialize-wip \
          -H "X-API-Key: ${MASTER_API_KEY}"
      after: healthy
