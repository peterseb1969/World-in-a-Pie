# WIP Registry Service - Development
# Requires: docker-compose -f ../../docker-compose.infra.yml up -d
version: "3.8"

services:
  registry:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wip-registry-dev
    ports:
      - "8001:8001"
    env_file:
      - ../../.env
    environment:
      - PYTHONPATH=/app/src
      - MONGO_URI=${WIP_MONGO_URI:-mongodb://wip-mongodb:27017/}
      - DATABASE_NAME=wip_registry_dev
      - MASTER_API_KEY=dev_master_key_for_testing
      - AUTH_ENABLED=true
      - CORS_ORIGINS=*
      # Auth config (WIP_AUTH_*) comes from .env via env_file
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:ro
      - ./tests:/app/tests:ro
      - ../../libs/wip-auth:/app/libs/wip-auth:ro
    command: bash -c "pip install -q /app/libs/wip-auth && uvicorn registry.main:app --host 0.0.0.0 --port 8001 --reload"
    networks:
      - wip-network

networks:
  wip-network:
    external: true
