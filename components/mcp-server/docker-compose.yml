services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wip-mcp-server
    ports:
      - "8006:8006"
    env_file:
      - ../../.env
    environment:
      - PYTHONPATH=/app/src
      - REGISTRY_URL=${REGISTRY_URL:-http://wip-registry:8001}
      - DEF_STORE_URL=${DEF_STORE_URL:-http://wip-def-store:8002}
      - TEMPLATE_STORE_URL=${TEMPLATE_STORE_URL:-http://wip-template-store:8003}
      - DOCUMENT_STORE_URL=${DOCUMENT_STORE_URL:-http://wip-document-store:8004}
      - REPORTING_SYNC_URL=${REPORTING_SYNC_URL:-http://wip-reporting-sync:8005}
      - WIP_API_KEY=${API_KEY:-dev_master_key_for_testing}
    networks:
      - wip-network
    restart: ${WIP_RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wip-network:
    external: true
