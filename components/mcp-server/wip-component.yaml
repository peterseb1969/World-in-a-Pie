api_version: wip.dev/v1
kind: Component
metadata:
  name: mcp-server
  category: optional
  description: |
    Model Context Protocol server. Exposes 70+ tools and resources for
    AI-assisted development against WIP. HTTP streamable transport on
    /mcp.

spec:
  image:
    name: mcp-server
    # Per-component tag override. The /health-exempt-from-auth fix
    # landed after v1.1.0; using spec.images.tag=v1.1.0 would pull the
    # old image with the broken /health endpoint.
    tag: wipkb-20260523
    build_context: .

  ports:
    - {name: http, container_port: 8007}

  env:
    required:
      - {name: REGISTRY_URL, source: {from_component: registry}}
      - {name: DEF_STORE_URL, source: {from_component: def-store}}
      - {name: TEMPLATE_STORE_URL, source: {from_component: template-store}}
      - {name: DOCUMENT_STORE_URL, source: {from_component: document-store}}
      - {name: MASTER_API_KEY, source: {from_secret: api-key}}
      # CASE-377: DNS-rebinding protection allow-list. Without this the
      # MCP server rejects same-network clients connecting via the
      # container DNS name (e.g. WIP-KB at http://wip-mcp-server:8007/mcp)
      # with HTTP 421 "Invalid Host header". Outer-Caddy-proxied calls
      # work via Host normalization; same-network direct calls don't.
      # Value matches the container hostname produced by the renderer
      # (always `wip-<component-name>` per the compose/k8s naming contract).
      - {name: MCP_ALLOWED_HOST, source: {literal: "wip-mcp-server"}}
    optional:
      # The 8 reporting-sync MCP tools (search, run_report_query,
      # get_table_view, list_report_tables, query_by_template,
      # export_report_csv, export_table_csv, get_sync_status) only work
      # when reporting-sync is active. Declared optional because
      # reporting-sync is itself optional: when inactive, the var stays
      # unset and the MCP client falls back to its in-process default
      # (which fails fast at first call rather than silently). CASE-330.
      - {name: REPORTING_SYNC_URL, source: {from_component: reporting-sync}}

  routes:
    # redirect_bare_path=false: MCPs StreamableHTTP transport mounts
    # at /mcp (no slash) and 307-redirects /mcp/ → /mcp. Caddys default
    # bare-path redirect goes the other way, creating a loop. Backend
    # handles slash canonicalization; Caddy must stay out.
    - {path: /mcp, auth_required: false, redirect_bare_path: false}

  depends_on: [registry, def-store, template-store, document-store]

  # MCP uses its own HTTP transport harness (not a bare uvicorn ASGI
  # app), and the image's module name (`wip_mcp`) doesn't match the
  # component name. Explicit `command:` pins the right entry point.
  command: [python, -m, wip_mcp, --http]

  healthcheck:
    endpoint: /health
