# WIP MCP Server — Tool Configuration
#
# This file defines metadata for MCP tools. Parameter schemas are derived
# from OpenAPI specs (via generate_schemas.py), not hand-written here.
#
# Fields:
#   description: Human-written guidance (the "why" and gotchas)
#   openapi_schema: "service#ModelName" — which OpenAPI request model to use
#   param_name: Which function parameter receives the schema
#   param_type: "list" if param is list[dict], omit for single dict
#   nested_schemas: Additional schemas to include in the description
#   notes: Extra guidance appended to the description

tools:
  # -- Terminologies --
  create_terminology:
    description: "Create a terminology (controlled vocabulary)."
    openapi_schema: "def-store#CreateTerminologyRequest"
    param_name: null  # scalar params, schema used for description only
    notes: |
      Convention: use UPPER_SNAKE_CASE for the value field.
      A terminology is a namespace for terms — e.g., COUNTRY, GENDER, DIAGNOSIS_CODE.

  create_terminologies_bulk:
    description: "Create multiple terminologies at once."
    openapi_schema: "def-store#CreateTerminologyRequest"
    param_name: "items"
    param_type: list
    notes: |
      Each item follows the same schema as create_terminology.

  # -- Terms --
  create_terms:
    description: "Create terms in a terminology."
    openapi_schema: "def-store#CreateTermRequest"
    param_name: "terms"
    param_type: list
    notes: |
      Terms are entries in a terminology (e.g., "GB" in COUNTRY, "Male" in GENDER).
      Each term must have a 'value' field (unique within the terminology).
      Optional: aliases (list of strings), label, description, sort_order.

  # -- Ontology --
  create_term_relations:
    description: "Create ontology term-relations between terms."
    openapi_schema: "def-store#CreateTermRelationRequest"
    param_name: "term_relations"
    param_type: list
    notes: |
      Relation types: is_a, part_of, has_part, regulates, positively_regulates, negatively_regulates.
      Use source_term_id (subject) and target_term_id (object).
      Example: "Lung cancer" --is_a--> "Cancer"

  # -- Templates --
  create_template:
    description: "Create a template (document schema)."
    openapi_schema: "template-store#CreateTemplateRequest"
    param_name: "template"
    nested_schemas:
      - "template-store#FieldDefinition"
    notes: |
      IMPORTANT field naming:
        - Use "mandatory" (not "required") for required fields
        - Use "terminology_ref" (not "terminology_id") for term field references
        - Use "template_ref" (not "template_id") for reference field references
      Use status: "draft" for circular dependencies, then activate_template.
      Convention: use UPPER_SNAKE_CASE for the value field.

  create_templates_bulk:
    description: "Create multiple templates. Use status: 'draft' for circular dependencies, then activate."
    openapi_schema: "template-store#CreateTemplateRequest"
    param_name: "templates"
    param_type: list
    nested_schemas:
      - "template-store#FieldDefinition"
    notes: |
      Each item follows the same schema as create_template.
      IMPORTANT: Use "mandatory" (not "required"), "terminology_ref" (not "terminology_id").

  # -- Documents --
  create_document:
    description: "Create a document (an instance of a template)."
    openapi_schema: "document-store#DocumentCreateRequest"
    param_name: "document"
    notes: |
      Term fields: submit the human-readable value (e.g., "United Kingdom").
      WIP resolves it to the term_id automatically. If resolution fails,
      you'll get a clear error indicating which field/value failed.
      If the template defines identity_fields and this document matches
      an existing one, it creates a new version instead of a duplicate.

  create_documents_bulk:
    description: "Create multiple documents at once. Returns per-item results."
    openapi_schema: "document-store#DocumentCreateRequest"
    param_name: "documents"
    param_type: list
    notes: |
      Each item follows the same schema as create_document.

  # -- Query --
  query_documents:
    description: "Query documents with complex filters (low-level). Prefer query_by_template."
    openapi_schema: null  # freeform query body
    param_name: "filters"
    notes: |
      filters.filters: [{field: "data.country", operator: "eq", value: "CH"}]
      Operators: eq, ne, gt, gte, lt, lte, in, nin, exists, regex.
      Field names MUST include "data." prefix for document data fields.
      Use query_by_template for easier querying (auto-prefixes fields).

  query_by_template:
    description: "Query documents by template value with easy field filtering."
    openapi_schema: null
    param_name: null
    notes: |
      Resolves template_value → template_id automatically.
      Field names auto-prefixed with "data." — write "country" not "data.country".
      field_filters: [{"field": "country", "operator": "eq", "value": "CH"}]
      Operators: eq, ne, gt, gte, lt, lte, in, nin, exists, regex.

  get_template_fields:
    description: "Get a clean summary of a template's fields for querying or document creation."
    openapi_schema: null
    param_name: null
    notes: |
      Returns template_id, field names, types, mandatory flags, and references.
      Use this to understand what data a template holds before querying.

  # -- Files --
  upload_file:
    description: "Upload a file to WIP from a local path."
    openapi_schema: null
    param_name: null
    notes: |
      Reads a file from disk and uploads it to WIP's MinIO-backed file storage.
      Supports any file type. Returns file_id for use in document file fields.
      Tags are comma-separated (e.g., "receipt,2024,tax").

  # -- Reporting & SQL --
  list_report_tables:
    description: "List available PostgreSQL reporting tables and their schemas."
    openapi_schema: null
    param_name: null
    notes: |
      Returns doc_* tables (one per template) plus terminologies, terms, term_relations.
      Use this before run_report_query to understand available tables and columns.

  run_report_query:
    description: "Execute a read-only SQL query against the PostgreSQL reporting database."
    openapi_schema: null
    param_name: null
    notes: |
      For cross-template JOINs, aggregations, and analytics.
      Tables: doc_{template_value} (e.g., doc_patient).
      Term fields: {field} (value) + {field}_term_id columns.
      Use $1, $2 for parameter binding. Read-only: no INSERT/UPDATE/DELETE.
      Timeout: 30s default. Max rows: 1000 default.

  # -- Import (CSV/XLSX) --
  import_documents_csv:
    description: "Import documents from a CSV/XLSX file into a template."
    openapi_schema: null
    param_name: null
    notes: |
      Reads a local CSV/XLSX file, maps columns to template fields,
      and creates documents in bulk. Auto-maps columns if mapping is omitted.
      Term fields: use human-readable values in the CSV.

  # -- Replay --
  start_replay:
    description: "Start replaying stored documents as NATS events."
    openapi_schema: null
    param_name: null
    notes: |
      For onboarding new consumers or backfilling data.
      Events go to a separate NATS stream with metadata.replay=true.
      Use get_replay_status to track progress, cancel_replay to stop.

  get_replay_status:
    description: "Get the status of a replay session."
    openapi_schema: null
    param_name: null

  cancel_replay:
    description: "Cancel a replay session and delete its NATS stream."
    openapi_schema: null
    param_name: null

  # -- Terminology Import --
  import_terminology:
    description: "Import a terminology with terms from JSON data."
    openapi_schema: null  # freeform import body
    param_name: "data"
    notes: |
      The import format matches the export format from export_terminology.
