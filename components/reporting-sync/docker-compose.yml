# Reporting Sync Service - Production
# Requires: docker-compose.infra.yml (MongoDB, PostgreSQL, NATS)
version: "3.8"

services:
  reporting-sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wip-reporting-sync
    ports:
      - "8005:8005"
    env_file:
      - ../../.env
    environment:
      # NATS - use container name from infra
      - NATS_URL=${NATS_URL:-nats://wip-nats:4222}
      # PostgreSQL - use container name from infra
      - POSTGRES_HOST=wip-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=wip_reporting
      - POSTGRES_USER=wip
      - POSTGRES_PASSWORD=${WIP_POSTGRES_PASSWORD:-wip}
      # Template Store
      - TEMPLATE_STORE_URL=http://wip-template-store:8003
      - TEMPLATE_STORE_API_KEY=${API_KEY}
      # Document Store (for batch sync)
      - DOCUMENT_STORE_URL=http://wip-document-store:8004
      - DOCUMENT_STORE_API_KEY=${API_KEY}
      # Def-Store (for terminology/term search)
      - DEF_STORE_URL=http://wip-def-store:8002
      - DEF_STORE_API_KEY=${API_KEY}
      # Auth config (WIP_AUTH_*) comes from .env via env_file
    volumes:
      - ../../libs/wip-auth:/app/libs/wip-auth:ro
    command: bash -c "pip install -q /app/libs/wip-auth && uvicorn reporting_sync.main:app --host 0.0.0.0 --port 8005"
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wip-network:
    external: true
