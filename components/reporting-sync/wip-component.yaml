api_version: wip.dev/v1
kind: Component
metadata:
  name: reporting-sync
  category: optional
  description: |
    Syncs MongoDB document changes into PostgreSQL via NATS events.
    Enables SQL analytics, cross-template JOINs, and aggregation
    queries via run_report_query. Requires postgres + nats to be
    deployed; activating this module auto-activates them.

spec:
  image:
    name: reporting-sync
    build_context: .

  ports:
    - {name: http, container_port: 8005}

  command: [uvicorn, reporting_sync.main:app, --host, 0.0.0.0, --port, "8005"]

  env:
    required:
      - {name: NATS_URL, source: {from_component: nats}}
      - {name: POSTGRES_HOST, source: {from_component_host: postgres}}
      - {name: POSTGRES_PORT, source: {from_component_port: postgres}}
      - {name: POSTGRES_DB, source: {literal: wip_reporting}}
      - {name: POSTGRES_USER, source: {literal: wip}}
      - {name: POSTGRES_PASSWORD, source: {from_secret: postgres-password}}
      - {name: DEF_STORE_URL, source: {from_component: def-store}}
      - {name: TEMPLATE_STORE_URL, source: {from_component: template-store}}
      - {name: DOCUMENT_STORE_URL, source: {from_component: document-store}}
      - {name: MASTER_API_KEY, source: {from_secret: api-key}}
    optional:
      - {name: CORS_ORIGINS, source: {from_spec: network.cors_origins}}

  routes:
    - {path: /api/reporting-sync, auth_required: true}

  depends_on: [nats, postgres, def-store, template-store, document-store]

  healthcheck:
    endpoint: /health
    start_period_seconds: 20
