# WIP Reporting Sync Service — Unified dev/prod configuration
# Dev overrides (source mounts) are in docker-compose.override.yml (auto-generated by setup.sh)
services:
  reporting-sync:
    container_name: wip-reporting-sync
    image: kubi5-1.local:32000/wip-reporting-sync:latest
    ports:
      - "8005:8005"
    env_file:
      - ../../.env
    environment:
      - NATS_URL=${NATS_URL-nats://wip-nats:4222}
      - POSTGRES_HOST=wip-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=wip_reporting
      - POSTGRES_USER=wip
      - POSTGRES_PASSWORD=${WIP_POSTGRES_PASSWORD:-wip}
      - TEMPLATE_STORE_URL=${TEMPLATE_STORE_URL:-http://wip-template-store:8003}
      - TEMPLATE_STORE_API_KEY=${API_KEY}
      - DOCUMENT_STORE_URL=${DOCUMENT_STORE_URL:-http://wip-document-store:8004}
      - DOCUMENT_STORE_API_KEY=${API_KEY}
      - DEF_STORE_URL=${DEF_STORE_URL:-http://wip-def-store:8002}
      - DEF_STORE_API_KEY=${API_KEY}
      - CORS_ORIGINS=${WIP_CORS_ORIGINS:-}
    command: ["uvicorn", "reporting_sync.main:app", "--host", "0.0.0.0", "--port", "8005"]
    networks:
      - wip-network
    restart: ${WIP_RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wip-network:
    external: true
