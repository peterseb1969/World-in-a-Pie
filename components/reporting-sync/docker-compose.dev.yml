# Reporting Sync Service - Development
# Requires: docker-compose.infra.yml (MongoDB, PostgreSQL, NATS)
version: "3.8"

services:
  reporting-sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wip-reporting-sync-dev
    ports:
      - "8005:8005"
    environment:
      - DEBUG=true
      # NATS - use container name from infra
      - NATS_URL=nats://wip-nats:4222
      # PostgreSQL - use container name from infra
      - POSTGRES_HOST=wip-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=wip_reporting
      - POSTGRES_USER=wip
      - POSTGRES_PASSWORD=wip_dev_password
      # Template Store
      - TEMPLATE_STORE_URL=http://wip-template-store-dev:8003
      # Document Store (for batch sync)
      - DOCUMENT_STORE_URL=http://wip-document-store-dev:8004
      - API_KEY=dev_master_key_for_testing
    volumes:
      - ./src:/app/src:ro
    networks:
      - wip-network
    restart: unless-stopped

networks:
  wip-network:
    external: true
    name: wip-network
