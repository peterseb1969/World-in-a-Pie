# Reporting Sync Service - Development
# Requires: docker-compose.infra.yml (MongoDB, PostgreSQL, NATS)
#           Run setup.sh first to generate .env with auth configuration
version: "3.8"

services:
  reporting-sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wip-reporting-sync-dev
    ports:
      - "8005:8005"
    env_file:
      - ../../.env
    environment:
      # Service-specific configuration
      - DEBUG=true
      # NATS - use container name from infra
      - NATS_URL=nats://wip-nats:4222
      # PostgreSQL - use container name from infra
      - POSTGRES_HOST=wip-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=wip_reporting
      - POSTGRES_USER=wip
      - POSTGRES_PASSWORD=${WIP_POSTGRES_PASSWORD:-wip}
      # Template Store
      - TEMPLATE_STORE_URL=http://wip-template-store-dev:8003
      # Document Store (for batch sync)
      - DOCUMENT_STORE_URL=http://wip-document-store-dev:8004
      # Def-Store (for terminology/term search)
      - DEF_STORE_URL=http://wip-def-store-dev:8002
      - API_KEY=dev_master_key_for_testing
      # Auth config (WIP_AUTH_*) comes from .env via env_file
      - WIP_AUTH_API_KEYS_FILE=/app/config/api-keys.json
    volumes:
      - ./src:/app/src:ro
      - ../../libs/wip-auth:/app/libs/wip-auth:ro
      - ../../config/api-keys.dev.json:/app/config/api-keys.json:ro
    command: bash -c "pip install -q /app/libs/wip-auth && uvicorn reporting_sync.main:app --host 0.0.0.0 --port 8005 --reload"
    networks:
      - wip-network
    restart: unless-stopped

networks:
  wip-network:
    external: true
    name: wip-network
