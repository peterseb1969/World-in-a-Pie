# WIP Template Store Service - Development
# Requires: docker-compose -f ../../docker-compose.infra.yml up -d
#           Registry service running and WIP namespaces initialized
#           Def-Store service running (optional, for terminology validation)
version: "3.8"

services:
  template-store:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wip-template-store-dev
    ports:
      - "8003:8003"
    environment:
      - MONGO_URI=mongodb://wip-mongodb:27017/
      - DATABASE_NAME=wip_template_store_dev
      - REGISTRY_URL=http://wip-registry-dev:8001
      - REGISTRY_API_KEY=dev_master_key_for_testing
      - DEF_STORE_URL=http://wip-def-store-dev:8002
      - DEF_STORE_API_KEY=dev_master_key_for_testing
      - NATS_URL=nats://wip-nats:4222
      - CORS_ORIGINS=*
      - PYTHONPATH=/app/src
      # Authentication - dual mode allows both API keys and JWT tokens
      - WIP_AUTH_MODE=dual
      - WIP_AUTH_LEGACY_API_KEY=dev_master_key_for_testing
      # Issuer URL matches what's in the token (localhost for browser/CLI compatibility)
      - WIP_AUTH_JWT_ISSUER_URL=http://localhost:5556/dex
      # JWKS fetched via host.containers.internal (reachable from inside container)
      - WIP_AUTH_JWT_JWKS_URI=http://host.containers.internal:5556/dex/keys
      - WIP_AUTH_JWT_AUDIENCE=wip-console
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ../../libs/wip-auth:/app/libs/wip-auth:ro
    command: bash -c "pip install -q /app/libs/wip-auth && uvicorn template_store.main:app --host 0.0.0.0 --port 8003 --reload"
    networks:
      - wip-network

networks:
  wip-network:
    external: true
