api_version: wip.dev/v1
kind: Component
metadata:
  name: template-store
  category: core
  description: |
    Document schema management. Stores templates with field definitions,
    inheritance, and draft mode. Document-Store consults it during
    document validation.

spec:
  image:
    name: template-store
    build_context: .

  ports:
    - {name: http, container_port: 8003}

  command: [uvicorn, template_store.main:app, --host, 0.0.0.0, --port, "8003"]

  env:
    required:
      - {name: MONGO_URI, source: {from_component: mongodb}}
      - {name: DATABASE_NAME, source: {literal: wip_template_store}}
      - {name: REGISTRY_URL, source: {from_component: registry}}
      - {name: DEF_STORE_URL, source: {from_component: def-store}}
      - {name: MASTER_API_KEY, source: {from_secret: api-key}}
      # Outbound credentials for calls to registry + def-store.
      - {name: REGISTRY_API_KEY, source: {from_secret: api-key}}
      - {name: DEF_STORE_API_KEY, source: {from_secret: api-key}}
    optional:
      - {name: CORS_ORIGINS, source: {from_spec: network.cors_origins}}
      # NATS is optional — only present when reporting or ingest module active.
      # Template-store publishes template lifecycle events here; reporting-sync's
      # worker consumes them to materialize per-template doc_* tables. When
      # NATS_URL is empty the service gracefully skips publish.
      - {name: NATS_URL, source: {from_component: nats}}

  routes:
    - {path: /api/template-store, auth_required: false}

  depends_on: [mongodb, registry, def-store]

  healthcheck:
    endpoint: /health
