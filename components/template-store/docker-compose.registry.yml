# WIP Template Store Service — Unified dev/prod configuration
# Dev overrides (source mounts) are in docker-compose.override.yml (auto-generated by setup.sh)
services:
  template-store:
    container_name: wip-template-store
    image: kubi5-1.local:32000/wip-template-store:latest
    ports:
      - "8003:8003"
    env_file:
      - ../../.env
    environment:
      - PYTHONPATH=/app/src
      - MONGO_URI=${WIP_MONGO_URI:-mongodb://wip-mongodb:27017/}
      - DATABASE_NAME=wip_template_store
      - REGISTRY_URL=${REGISTRY_URL:-http://wip-registry:8001}
      - REGISTRY_API_KEY=${API_KEY}
      - DEF_STORE_URL=${DEF_STORE_URL:-http://wip-def-store:8002}
      - DEF_STORE_API_KEY=${API_KEY}
      - DOCUMENT_STORE_URL=${DOCUMENT_STORE_URL:-http://wip-document-store:8004}
      - DOCUMENT_STORE_API_KEY=${API_KEY}
      - NATS_URL=${NATS_URL:-nats://wip-nats:4222}
      - CORS_ORIGINS=${WIP_CORS_ORIGINS:-}
    command: ["uvicorn", "template_store.main:app", "--host", "0.0.0.0", "--port", "8003"]
    networks:
      - wip-network
    restart: ${WIP_RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wip-network:
    external: true
