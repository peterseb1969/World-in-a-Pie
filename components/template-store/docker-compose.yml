# WIP Template Store Service - Production
# Requires: Infrastructure services running (MongoDB)
version: "3.8"

services:
  template-store:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wip-template-store
    ports:
      - "8003:8003"
    env_file:
      - ../../.env
    environment:
      # Database configuration
      - MONGO_URI=${WIP_MONGO_URI:-mongodb://wip-mongodb:27017/}
      - DATABASE_NAME=wip_template_store
      # Service URLs (internal network)
      - REGISTRY_URL=http://wip-registry:8001
      - DEF_STORE_URL=http://wip-def-store:8002
      # CORS (allow all in production behind reverse proxy)
      - CORS_ORIGINS=*
      - PYTHONPATH=/app/src
      # Auth config (WIP_AUTH_*) comes from .env via env_file
    networks:
      - wip-network
    restart: unless-stopped

networks:
  wip-network:
    external: true
