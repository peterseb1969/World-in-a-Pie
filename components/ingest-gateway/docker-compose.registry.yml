# WIP Ingest Gateway Service — Unified dev/prod configuration
# Dev overrides (source mounts) are in docker-compose.override.yml (auto-generated by setup.sh)
services:
  ingest-gateway:
    container_name: wip-ingest-gateway
    image: kubi5-1.local:32000/wip-ingest-gateway:latest
    ports:
      - "8006:8006"
    env_file:
      - ../../.env
    environment:
      - NATS_URL=${NATS_URL:-nats://wip-nats:4222}
      - DEF_STORE_URL=${DEF_STORE_URL:-http://wip-def-store:8002}
      - TEMPLATE_STORE_URL=${TEMPLATE_STORE_URL:-http://wip-template-store:8003}
      - DOCUMENT_STORE_URL=${DOCUMENT_STORE_URL:-http://wip-document-store:8004}
      - API_KEY=${API_KEY}
      - CORS_ORIGINS=${WIP_CORS_ORIGINS:-}
    command: ["uvicorn", "ingest_gateway.main:app", "--host", "0.0.0.0", "--port", "8006"]
    networks:
      - wip-network
    restart: ${WIP_RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wip-network:
    external: true
