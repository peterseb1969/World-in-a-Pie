api_version: wip.dev/v1
kind: Component
metadata:
  name: ingest-gateway
  category: optional
  description: |
    Async bulk ingestion via NATS JetStream. Accepts high-throughput
    document streams and emits validated writes into Document-Store
    via NATS consumers. Requires nats to be deployed.

spec:
  image:
    name: ingest-gateway
    build_context: .

  ports:
    - {name: http, container_port: 8006}

  command: [uvicorn, ingest_gateway.main:app, --host, 0.0.0.0, --port, "8006"]

  env:
    required:
      - {name: NATS_URL, source: {from_component: nats}}
      - {name: DEF_STORE_URL, source: {from_component: def-store}}
      - {name: TEMPLATE_STORE_URL, source: {from_component: template-store}}
      - {name: DOCUMENT_STORE_URL, source: {from_component: document-store}}
      - {name: MASTER_API_KEY, source: {from_secret: api-key}}
    optional:
      - {name: CORS_ORIGINS, source: {from_spec: network.cors_origins}}

  routes:
    - {path: /api/ingest-gateway, auth_required: false}

  depends_on: [nats, def-store, template-store, document-store]

  healthcheck:
    endpoint: /api/ingest-gateway/health
    start_period_seconds: 20
