# Ingest Gateway Service - Production
# Requires: docker-compose.infra.yml (NATS) and other WIP services
version: "3.8"

services:
  ingest-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wip-ingest-gateway
    ports:
      - "8006:8006"
    env_file:
      - ../../.env
    environment:
      - NATS_URL=${NATS_URL:-nats://wip-nats:4222}
      - DEF_STORE_URL=http://wip-def-store:8002
      - TEMPLATE_STORE_URL=http://wip-template-store:8003
      - DOCUMENT_STORE_URL=http://wip-document-store:8004
      # Auth config (WIP_AUTH_*) comes from .env via env_file
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wip-network:
    external: true
