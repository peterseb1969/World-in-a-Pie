# WIP Shared Infrastructure - Production
#
# This compose file provides a production-ready configuration with:
#   - All services with authentication enabled
#   - Resource limits for predictable performance
#   - Internal networking (only Caddy exposed externally)
#   - Docker secrets support for sensitive credentials
#   - Proper health checks with conservative intervals
#
# Prerequisites:
#   1. Copy .env.prod.example to .env.prod and configure all required variables
#   2. Create secrets directory: mkdir -p ${WIP_DATA_DIR}/secrets
#   3. Generate secrets:
#        openssl rand -hex 32 > ${WIP_DATA_DIR}/secrets/mongo_password
#        openssl rand -hex 32 > ${WIP_DATA_DIR}/secrets/postgres_password
#        openssl rand -hex 32 > ${WIP_DATA_DIR}/secrets/minio_password
#        openssl rand -hex 32 > ${WIP_DATA_DIR}/secrets/api_key
#
# Usage:
#   podman-compose --env-file .env.prod -f docker-compose.infra.prod.yml up -d
#
# See docs/production-deployment.md for complete production deployment guide.
#

services:
  # ===================
  # Document Store
  # ===================
  mongodb:
    image: docker.io/library/mongo:${WIP_MONGODB_IMAGE_TAG:-7}
    container_name: wip-mongodb
    # No external port exposure - access via internal network only
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-wiproot}
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_password
    volumes:
      - ${WIP_DATA_DIR:?WIP_DATA_DIR is required}/mongodb:/data/db
    secrets:
      - mongo_password
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_ROOT_USER:-wiproot}", "-p", "$$(cat /run/secrets/mongo_password)", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - wip-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${WIP_MONGODB_MEMORY_LIMIT:-2G}
        reservations:
          memory: 512M

  # ===================
  # Reporting Store
  # ===================
  postgres:
    image: docker.io/library/postgres:${WIP_POSTGRES_IMAGE_TAG:-16}
    container_name: wip-postgres
    # No external port exposure - access via internal network only
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wip_reporting}
      POSTGRES_USER: ${POSTGRES_USER:-wip}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - ${WIP_DATA_DIR}/postgres:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wip} -d ${POSTGRES_DB:-wip_reporting}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - wip-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${WIP_POSTGRES_MEMORY_LIMIT:-1G}
        reservations:
          memory: 256M

  # ===================
  # Message Queue
  # ===================
  nats:
    image: docker.io/library/nats:${WIP_NATS_IMAGE_TAG:-2.10}
    container_name: wip-nats
    command: ["--js", "--sd", "/data", "-m", "8222"]
    # No external port exposure - access via internal network only
    volumes:
      - ${WIP_DATA_DIR}/nats:/data
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wip-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${WIP_NATS_MEMORY_LIMIT:-512M}
        reservations:
          memory: 64M

  # ===================
  # File Storage (S3-compatible)
  # ===================
  minio:
    image: quay.io/minio/minio:${WIP_MINIO_IMAGE_TAG:-latest}
    container_name: wip-minio
    command: server /data --console-address ":9001"
    # No external port exposure - access via internal network only
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-wipminio}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_password
    volumes:
      - ${WIP_DATA_DIR}/minio:/data
    secrets:
      - minio_password
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - wip-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${WIP_MINIO_MEMORY_LIMIT:-512M}
        reservations:
          memory: 128M

  # ===================
  # Authentication (OIDC)
  # ===================
  # NOTE: For production, consider replacing Dex with:
  #   - Authentik (enterprise features, user management UI)
  #   - Keycloak (full-featured IAM)
  #   - Your organization's existing OIDC provider
  dex:
    image: ghcr.io/dexidp/dex:${WIP_DEX_IMAGE_TAG:-v2.38.0}
    container_name: wip-dex
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    # No external port exposure - access via Caddy reverse proxy
    volumes:
      - ./config/dex:/etc/dex:ro
      - ${WIP_DATA_DIR}/dex:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5556/dex/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wip-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${WIP_DEX_MEMORY_LIMIT:-128M}
        reservations:
          memory: 32M

  # ===================
  # Reverse Proxy (HTTPS) - ONLY EXTERNALLY EXPOSED SERVICE
  # ===================
  caddy:
    image: docker.io/library/caddy:${WIP_CADDY_IMAGE_TAG:-2-alpine}
    container_name: wip-caddy
    ports:
      # HTTP (redirects to HTTPS)
      - "${WIP_HTTP_PORT:-80}:80"
      # HTTPS (main entry point)
      - "${WIP_HTTPS_PORT:-443}:443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${WIP_DATA_DIR}/caddy/data:/data
      - ${WIP_DATA_DIR}/caddy/config:/config
      # For Let's Encrypt certificates, mount ACME storage
      - ${WIP_DATA_DIR}/caddy/certificates:/root/.caddy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wip-internal
      - wip-external
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${WIP_CADDY_MEMORY_LIMIT:-128M}
        reservations:
          memory: 32M

# ===================
# Networks
# ===================
networks:
  # Internal network - services communicate here
  wip-internal:
    name: wip-internal
    driver: bridge
    internal: true  # No external access

  # External network - only Caddy connects to outside
  wip-external:
    name: wip-external
    driver: bridge

# ===================
# Secrets (Docker Secrets)
# ===================
# Secrets are read from files in ${WIP_DATA_DIR}/secrets/
# Create these files before starting:
#   echo "your-mongo-password" > ${WIP_DATA_DIR}/secrets/mongo_password
#   echo "your-postgres-password" > ${WIP_DATA_DIR}/secrets/postgres_password
#   echo "your-minio-password" > ${WIP_DATA_DIR}/secrets/minio_password
#
secrets:
  mongo_password:
    file: ${WIP_DATA_DIR}/secrets/mongo_password
  postgres_password:
    file: ${WIP_DATA_DIR}/secrets/postgres_password
  minio_password:
    file: ${WIP_DATA_DIR}/secrets/minio_password
