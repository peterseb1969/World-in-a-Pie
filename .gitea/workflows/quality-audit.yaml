name: Quality Audit
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  quality-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools and run quality audit
        run: |
          python3 -m venv "$PWD/.venv"
          . "$PWD/.venv/bin/activate"
          pip install ruff mypy vulture radon shellcheck-py
          echo "DEBUG: which radon = $(which radon 2>&1 || echo 'NOT FOUND')"
          echo "DEBUG: VIRTUAL_ENV = ${VIRTUAL_ENV:-unset}"
          echo "DEBUG: PATH = $PATH"
          echo "DEBUG: PWD = $PWD"
          ./scripts/quality-audit.sh --quick --ci

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: reports/quality-audit/REPORT.md
