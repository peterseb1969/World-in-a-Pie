name: Quality Audit
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  quality-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools and run quality audit
        run: |
          python3 -m venv "$PWD/.venv"
          . "$PWD/.venv/bin/activate"
          pip install ruff mypy vulture radon shellcheck-py
          ./scripts/quality-audit.sh --quick --ci
