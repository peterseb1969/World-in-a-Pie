name: Tests
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  # Fast lint checks (parallel with tests)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install tools
        run: |
          . .venv/bin/activate
          pip install ruff shellcheck-py

      - name: Ruff (changed files only)
        run: |
          . .venv/bin/activate
          CHANGED_PY=$(git diff --name-only --diff-filter=d HEAD~1 -- '*.py')
          if [ -n "$CHANGED_PY" ]; then
            echo "$CHANGED_PY" | xargs ruff check --config pyproject.toml --output-format=github
          else
            echo "No Python files changed"
          fi

      - name: ShellCheck (changed files only)
        run: |
          . .venv/bin/activate
          CHANGED_SH=$(git diff --name-only --diff-filter=d HEAD~1 -- '*.sh')
          if [ -n "$CHANGED_SH" ]; then
            echo "$CHANGED_SH" | xargs shellcheck
          else
            echo "No shell files changed"
          fi

      - name: Bandit security scan (changed files only)
        run: |
          . .venv/bin/activate
          pip install bandit
          CHANGED_PY=$(git diff --name-only --diff-filter=d HEAD~1 -- '*.py')
          if [ -n "$CHANGED_PY" ]; then
            echo "$CHANGED_PY" | xargs bandit -c pyproject.toml --severity-level medium -f txt || true
          else
            echo "No Python files changed"
          fi

  # Dependency vulnerability check
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Audit wip-auth dependencies
        run: |
          . .venv/bin/activate
          pip install pip-audit
          pip install -e libs/wip-auth
          pip-audit --desc --fix --dry-run || true

  # Components that need MongoDB
  test-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        component: [registry, def-store, template-store, document-store]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Start MongoDB
        run: |
          docker start test-mongo 2>/dev/null || \
            docker run -d --name test-mongo -p 27017:27017 mongo:7
          for i in $(seq 1 10); do
            docker exec test-mongo mongosh --quiet --eval "db.runCommand('ping')" && break
            sleep 1
          done

      - name: Install dependencies
        working-directory: components/${{ matrix.component }}
        run: |
          . "$GITHUB_WORKSPACE/.venv/bin/activate"
          pip install -r requirements.txt
          # Transport injection: component tests import registry.main in-process
          pip install -r ../registry/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: components/${{ matrix.component }}
        env:
          MONGO_URI: mongodb://localhost:27017/
          PYTHONPATH: src:../registry/src
        run: |
          . "$GITHUB_WORKSPACE/.venv/bin/activate"
          pytest tests/ -v --tb=short

  # Ingest gateway (no DB needed)
  test-ingest-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: components/ingest-gateway
        run: |
          . "$GITHUB_WORKSPACE/.venv/bin/activate"
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: components/ingest-gateway
        env:
          PYTHONPATH: src:tests
        run: |
          . "$GITHUB_WORKSPACE/.venv/bin/activate"
          pytest tests/ -v --tb=short

  # Reporting-sync (unit tests + PostgreSQL integration tests)
  test-reporting-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Start PostgreSQL
        run: |
          docker start test-postgres 2>/dev/null || \
            docker run -d --name test-postgres -p 5433:5432 \
              -e POSTGRES_USER=test -e POSTGRES_PASSWORD=test \
              -e POSTGRES_DB=wip_test postgres:16
          for i in $(seq 1 10); do
            docker exec test-postgres pg_isready -U test && break
            sleep 1
          done

      - name: Start NATS
        run: |
          docker start test-nats 2>/dev/null || \
            docker run -d --name test-nats --restart unless-stopped \
              -p 4223:4222 -p 8223:8222 nats:2 -js -m 8222
          for i in $(seq 1 10); do
            curl -s http://localhost:8223/healthz && break
            sleep 1
          done

      - name: Install dependencies
        working-directory: components/reporting-sync
        run: |
          . "$GITHUB_WORKSPACE/.venv/bin/activate"
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: components/reporting-sync
        env:
          PYTHONPATH: src
          POSTGRES_TEST_URI: postgresql://test:test@localhost:5433/wip_test
          NATS_TEST_URL: nats://localhost:4223
        run: |
          . "$GITHUB_WORKSPACE/.venv/bin/activate"
          pytest tests/ -v --tb=short

  # MCP server (no DB needed)
  test-mcp-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: components/mcp-server
        run: |
          . "$GITHUB_WORKSPACE/.venv/bin/activate"
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        working-directory: components/mcp-server
        env:
          PYTHONPATH: src
        run: |
          . "$GITHUB_WORKSPACE/.venv/bin/activate"
          pytest tests/ -v --tb=short

  # wip-auth library
  test-wip-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Start MongoDB
        run: |
          docker start test-mongo 2>/dev/null || \
            docker run -d --name test-mongo -p 27017:27017 mongo:7
          for i in $(seq 1 10); do
            docker exec test-mongo mongosh --quiet --eval "db.runCommand('ping')" && break
            sleep 1
          done

      - name: Install dependencies
        run: |
          . .venv/bin/activate
          pip install -e "libs/wip-auth[dev]"
          # Transport injection: test_fastapi_helpers imports registry.main in-process
          # Install registry deps but skip the editable wip-auth line (already installed above;
          # the relative path in requirements.txt is for components/registry/ working dir)
          grep -v '^\-e' components/registry/requirements.txt | pip install -r /dev/stdin

      - name: Run tests
        env:
          MONGO_URI: mongodb://localhost:27017/
          PYTHONPATH: components/registry/src
        run: |
          . .venv/bin/activate
          pytest libs/wip-auth/tests/ -v --tb=short

  # Deployer (wip-deploy CLI) — pure unit tests, no DB or NATS needed
  test-deployer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install deployer
        run: |
          . .venv/bin/activate
          pip install -e deployer
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest deployer/tests/unit/ -v --tb=short

  # WIP-Toolkit
  test-wip-toolkit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          . .venv/bin/activate
          pip install -e WIP-Toolkit
          pip install pytest

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest WIP-Toolkit/tests/ -v --tb=short
