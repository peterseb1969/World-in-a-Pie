apiVersion: v1
kind: Secret
metadata:
  name: wip-secrets
  namespace: wip
  labels:
    app.kubernetes.io/part-of: wip
type: Opaque
stringData:
  # ── Authentication ──────────────────────────────────────────────
  api-key: "CHANGE_ME_api_key"
  dex-client-secret: "CHANGE_ME_dex_secret"

  # ── MongoDB ─────────────────────────────────────────────────────
  # Leave empty for no-auth dev mode; set both for production
  mongo-user: ""
  mongo-password: ""
  mongo-uri: "mongodb://wip-mongodb:27017/"

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres-password: "CHANGE_ME_pg_password"

  # ── MinIO ───────────────────────────────────────────────────────
  minio-root-user: "CHANGE_ME_minio_user"
  minio-root-password: "CHANGE_ME_minio_password"
