          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: registry
      ports:
        - port: 8001
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: def-store
      ports:
        - port: 8002
