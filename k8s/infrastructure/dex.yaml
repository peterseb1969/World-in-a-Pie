apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wip-dex-data
  namespace: wip
  labels:
    app.kubernetes.io/name: dex
    app.kubernetes.io/part-of: wip
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: wip-dex
  namespace: wip
  labels:
    app.kubernetes.io/name: dex
    app.kubernetes.io/part-of: wip
spec:
  type: ClusterIP
  ports:
    - port: 5556
      targetPort: 5556
  selector:
    app.kubernetes.io/name: dex
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wip-dex
  namespace: wip
  labels:
    app.kubernetes.io/name: dex
    app.kubernetes.io/part-of: wip
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dex
        app.kubernetes.io/part-of: wip
    spec:
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.38.0
          command: ["dex", "serve", "/etc/dex/config.yaml"]
          ports:
            - containerPort: 5556
          env:
            - name: DEX_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: dex-client-secret
          volumeMounts:
            - name: config
              mountPath: /etc/dex
              readOnly: true
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /dex/healthz
              port: 5556
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /dex/healthz
              port: 5556
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: wip-dex-config
        - name: data
          persistentVolumeClaim:
            claimName: wip-dex-data
