apiVersion: v1
kind: Service
metadata:
  name: wip-mongodb
  namespace: wip
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: wip
spec:
  clusterIP: None
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app.kubernetes.io/name: mongodb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wip-mongodb
  namespace: wip
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: wip
spec:
  serviceName: wip-mongodb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/part-of: wip
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: mongo-user
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: mongo-password
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: rook-ceph-block
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
