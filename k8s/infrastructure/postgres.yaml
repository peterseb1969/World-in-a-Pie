apiVersion: v1
kind: Service
metadata:
  name: wip-postgres
  namespace: wip
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: wip
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wip-postgres
  namespace: wip
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: wip
spec:
  serviceName: wip-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: wip
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "wip_reporting"
            - name: POSTGRES_USER
              value: "wip"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "wip", "-d", "wip_reporting"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "wip", "-d", "wip_reporting"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: rook-ceph-block
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
