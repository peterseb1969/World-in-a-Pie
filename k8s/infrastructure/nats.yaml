apiVersion: v1
kind: Service
metadata:
  name: wip-nats
  namespace: wip
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: wip
spec:
  clusterIP: None
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitoring
      port: 8222
      targetPort: 8222
  selector:
    app.kubernetes.io/name: nats
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wip-nats
  namespace: wip
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: wip
spec:
  serviceName: wip-nats
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/part-of: wip
    spec:
      containers:
        - name: nats
          image: nats:2.10
          args: ["--js", "--sd", "/data", "-m", "8222"]
          ports:
            - name: client
              containerPort: 4222
            - name: monitoring
              containerPort: 8222
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: rook-ceph-block
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
