apiVersion: v1
kind: Service
metadata:
  name: wip-registry
  namespace: wip
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/part-of: wip
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
  selector:
    app.kubernetes.io/name: registry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wip-registry
  namespace: wip
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/part-of: wip
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry
        app.kubernetes.io/part-of: wip
    spec:
      containers:
        - name: registry
          image: localhost:32000/wip-registry:latest
          ports:
            - containerPort: 8001
          command: ["uvicorn", "registry.main:app", "--host", "0.0.0.0", "--port", "8001"]
          env:
            - name: PYTHONPATH
              value: "/app/src"
            - name: DATABASE_NAME
              value: "wip_registry"
            - name: AUTH_ENABLED
              value: "true"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: mongo-uri
            - name: MASTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: api-key
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: api-key
            - name: WIP_AUTH_LEGACY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: api-key
          envFrom:
            - configMapRef:
                name: wip-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
