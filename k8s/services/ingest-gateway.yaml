apiVersion: v1
kind: Service
metadata:
  name: wip-ingest-gateway
  namespace: wip
  labels:
    app.kubernetes.io/name: ingest-gateway
    app.kubernetes.io/part-of: wip
spec:
  type: ClusterIP
  ports:
    - port: 8006
      targetPort: 8006
  selector:
    app.kubernetes.io/name: ingest-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wip-ingest-gateway
  namespace: wip
  labels:
    app.kubernetes.io/name: ingest-gateway
    app.kubernetes.io/part-of: wip
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ingest-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingest-gateway
        app.kubernetes.io/part-of: wip
    spec:
      containers:
        - name: ingest-gateway
          image: wip/ingest-gateway:latest
          ports:
            - containerPort: 8006
          command: ["uvicorn", "ingest_gateway.main:app", "--host", "0.0.0.0", "--port", "8006"]
          env:
            - name: PYTHONPATH
              value: "/app/src"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: api-key
          envFrom:
            - configMapRef:
                name: wip-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
