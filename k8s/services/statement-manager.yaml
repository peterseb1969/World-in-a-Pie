apiVersion: v1
kind: Service
metadata:
  name: statement-manager
  namespace: wip
  labels:
    app.kubernetes.io/name: statement-manager
    app.kubernetes.io/part-of: wip
spec:
  type: ClusterIP
  ports:
    - port: 3012
      targetPort: 3012
  selector:
    app.kubernetes.io/name: statement-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: statement-manager
  namespace: wip
  labels:
    app.kubernetes.io/name: statement-manager
    app.kubernetes.io/part-of: wip
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: statement-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: statement-manager
        app.kubernetes.io/part-of: wip
    spec:
      containers:
        - name: statement-manager
          image: localhost:32000/statement-manager:latest
          ports:
            - containerPort: 3012
          env:
            - name: WIP_BASE_URL
              value: "https://wip-kubi.local"
            - name: WIP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: api-key
            - name: WIP_NAMESPACE
              value: "finance"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: PORT
              value: "3012"
          readinessProbe:
            httpGet:
              path: /health
              port: 3012
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3012
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: statement-manager-ingress
  namespace: wip
  labels:
    app.kubernetes.io/name: statement-manager
    app.kubernetes.io/part-of: wip
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - wip-kubi.local
      secretName: wip-tls
  rules:
    - host: wip-kubi.local
      http:
        paths:
          - path: /apps/finance(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: statement-manager
                port:
                  number: 3012
