apiVersion: v1
kind: Service
metadata:
  name: wip-reporting-sync
  namespace: wip
  labels:
    app.kubernetes.io/name: reporting-sync
    app.kubernetes.io/part-of: wip
spec:
  type: ClusterIP
  ports:
    - port: 8005
      targetPort: 8005
  selector:
    app.kubernetes.io/name: reporting-sync
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wip-reporting-sync
  namespace: wip
  labels:
    app.kubernetes.io/name: reporting-sync
    app.kubernetes.io/part-of: wip
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: reporting-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reporting-sync
        app.kubernetes.io/part-of: wip
    spec:
      containers:
        - name: reporting-sync
          image: wip/reporting-sync:latest
          ports:
            - containerPort: 8005
          command: ["uvicorn", "reporting_sync.main:app", "--host", "0.0.0.0", "--port", "8005"]
          env:
            - name: PYTHONPATH
              value: "/app/src"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: api-key
            - name: WIP_AUTH_LEGACY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: api-key
            - name: TEMPLATE_STORE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: api-key
            - name: DOCUMENT_STORE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: api-key
            - name: DEF_STORE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: api-key
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: postgres-password
          envFrom:
            - configMapRef:
                name: wip-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
