apiVersion: v1
kind: Service
metadata:
  name: wip-mcp-server
  namespace: wip
  labels:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/part-of: wip
spec:
  type: ClusterIP
  ports:
    - port: 8007
      targetPort: 8007
  selector:
    app.kubernetes.io/name: mcp-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wip-mcp-server
  namespace: wip
  labels:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/part-of: wip
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-server
        app.kubernetes.io/part-of: wip
    spec:
      containers:
        - name: mcp-server
          image: localhost:32000/wip-mcp-server:latest
          ports:
            - containerPort: 8007
          env:
            - name: MCP_PORT
              value: "8007"
            - name: MCP_ALLOWED_HOST
              value: "wip-kubi.local"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: api-key
            - name: WIP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wip-secrets
                  key: api-key
          envFrom:
            - configMapRef:
                name: wip-config
          readinessProbe:
            tcpSocket:
              port: 8007
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8007
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
