# WIP Shared Infrastructure - Minimal (API Keys Only)
# Use for quick development without OIDC
#
# Key differences from standard infra:
#   - No Dex (saves ~30MB RAM)
#   - No Caddy (saves ~25MB RAM)
#   - No Mongo Express (optional, can add back)
#   - Authentication via API keys only
#
# Services:
#   - MongoDB (document store): localhost:27017
#   - PostgreSQL (reporting store): localhost:5432 (wip/wip_dev_password)
#   - NATS (message queue): localhost:4222, monitoring: http://localhost:8222
#
# Storage Configuration:
#   Set WIP_DATA_DIR to customize where data is stored.
#   Default: ./data (relative to this file)
#
# Usage:
#   ./scripts/setup.sh --profile dev-minimal
#   # Or manually:
#   podman-compose -f docker-compose.infra.minimal.yml up -d
#
# Authentication:
#   Use X-API-Key header with: dev_master_key_for_testing
#   OIDC login will be hidden in the console
#
version: "3.8"

services:
  # ===================
  # Document Store
  # ===================
  mongodb:
    image: ${WIP_MONGODB_IMAGE:-docker.io/library/mongo:7}
    container_name: wip-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ${WIP_DATA_DIR:-./data}/mongodb:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wip-network
    restart: unless-stopped

  # ===================
  # Reporting Store
  # ===================
  postgres:
    image: docker.io/library/postgres:16
    container_name: wip-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wip_reporting
      POSTGRES_USER: wip
      POSTGRES_PASSWORD: wip_dev_password
    volumes:
      - ${WIP_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wip -d wip_reporting"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wip-network
    restart: unless-stopped

  # ===================
  # Message Queue
  # ===================
  nats:
    image: docker.io/library/nats:2.10
    container_name: wip-nats
    command: ["--js", "--sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    volumes:
      - ${WIP_DATA_DIR:-./data}/nats:/data
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - wip-network
    restart: unless-stopped

  # ===================
  # MongoDB Admin UI (Optional)
  # ===================
  mongo-express:
    image: docker.io/library/mongo-express
    container_name: wip-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - wip-network
    restart: unless-stopped

networks:
  wip-network:
    name: wip-network
    driver: bridge

# No named volumes - using bind mounts for configurable storage
# Data stored in ${WIP_DATA_DIR:-./data}/
