# WIP App: React Console
# Drop this file into your WIP install directory and re-run setup-wip.sh.
# See docs/install-test-guide.md for details.

services:
  react-console:
    image: gitea.local:3000/peter/react-console:v1.2-rc1
    container_name: wip-react-console
    labels:
      wip.app: "true"
      wip.app.name: "React Console"
      wip.app.route: "/apps/rc"
      wip.app.port: "3011"
      # OIDC is handled by the auth gateway — no per-app OIDC config needed.
    env_file: .env
    environment:
      WIP_BASE_URL: http://wip-caddy:8080
      WIP_API_KEY: ${API_KEY}
      # OIDC handled by gateway — identity arrives via X-WIP-User headers.
      PORT: "3011"
      APP_BASE_PATH: /apps/rc
      NATS_URL: nats://wip-nats:4222
      MONGO_URI: ${WIP_MONGO_URI:-mongodb://wip-mongodb:27017/}
      NODE_ENV: production
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      # askBar / NL query feature. Leave empty to disable — RC Console degrades
      # gracefully (the page shows an "unavailable" notice). To enable, set
      # ANTHROPIC_API_KEY=sk-ant-... in .env and recreate this container:
      #   podman-compose -f docker-compose.production.yml \
      #                  -f docker-compose.app.react-console.yml up -d
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    networks:
      - wip-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3011/apps/rc/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wip-network:
    external: true
